<!DOCTYPE html>
<html>
<head>
  <title>Survival RPG Game</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    .box {
      max-width: 500px;
      margin: auto;
      margin-top: 50px;
      padding: 20px;
      border: 2px solid #444;
      border-radius: 10px;
      background: #1c1c1c;
    }
    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>🔥 Survival RPG</h1>

  <p id="stats"></p>
  <p id="story">You wake up in a dangerous world...</p>

  <button onclick="explore()">Explore 🌲</button>
  <button onclick="train()">Train ⚔️</button>
  <button onclick="rest()">Rest 🛌</button>
</div>

<script>
let hp = 100;
let xp = 0;
let level = 1;

function update() {
  document.getElementById("stats").innerText =
    `HP: ${hp} | XP: ${xp} | Level: ${level}`;
}

function levelUp() {
  if (xp >= 100) {
    level++;
    xp = 0;
    hp = 100;
    document.getElementById("story").innerText = "🔥 You leveled up!";
  }
}

function explore() {
  let event = Math.random();

  if (event < 0.4) {
    xp += 20;
    hp -= 10;
    document.getElementById("story").innerText = "You fought a monster! ⚔️";
  } 
  else if (event < 0.7) {
    xp += 10;
    document.getElementById("story").innerText = "You found treasure! 💰";
  } 
  else {
    hp -= 20;
    document.getElementById("story").innerText = "You got ambushed! 💀";
  }

  levelUp();
  update();
}

function train() {
  xp += 15;
  hp -= 5;
  document.getElementById("story").innerText = "You trained hard ⚔️";
  levelUp();
  update();
}

function rest() {
  hp = 100;
  document.getElementById("story").innerText = "You rested and healed 🛌";
  update();
}

update();
</script>

</body>
</html>
